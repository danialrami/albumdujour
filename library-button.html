<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Full Library Button</title>
  <style>
    @keyframes lib-pulseShadow {
      0%, 100% {
        box-shadow: 2px 2px 0 #b0b0b0;
      }
      50% {
        box-shadow: 4px 4px 0 #888;
      }
    }
    
    @keyframes lib-float {
      0%, 100% { 
        transform: translateY(0px); 
      }
      50% { 
        transform: translateY(-2px); 
      }
    }
    
    @keyframes lib-sparkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.8; transform: scale(1); }
    }
    
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .webring-button {
      animation: lib-pulseShadow 2s infinite, lib-float 3s ease-in-out infinite;
      width: 88px;
      height: 31px;
      display: inline-block;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      background: #e0e0e0;
      border: 2px solid #b0b0b0;
      box-shadow: 2px 2px 0 0 #b0b0b0;
      margin: 0;
      padding: 0;
      transition: background 0.1s;
      position: relative;
    }
    
    .webring-button:hover {
      animation-play-state: paused;
      box-shadow: none;
      background: #d0d0d0;
    }
    
    .webring-button svg {
      width: 88px;
      height: 31px;
      display: block;
    }
    
    .lib-sparkle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      z-index: 10;
      animation: lib-sparkle 2s infinite;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <a href="https://docs.google.com/spreadsheets/d/1p8zTsGuQVV81tvuZswIHq-pIXCyZn9ixhg-2HWD9X10/edit?gid=0#gid=0" target="_blank" class="webring-button" title="View Full Library">
    <script>
      (function() {
        const addSparkles = function() {
          const button = document.querySelector('.webring-button');
          if (!button) return;
          
          for (let i = 0; i < 5; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'lib-sparkle';
            
            const left = 10 + Math.floor(Math.random() * 70);
            const top = 5 + Math.floor(Math.random() * 20);
            sparkle.style.left = left + 'px';
            sparkle.style.top = top + 'px';
            sparkle.style.animationDelay = (i * 0.4) + 's';
            
            button.appendChild(sparkle);
          }
        };
        
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', addSparkles);
        } else {
          addSparkles();
        }
      })();
    </script>
    
    <svg width="88" height="31" viewBox="0 0 88 31" xmlns="http://www.w3.org/2000/svg">
      <rect width="88" height="31" fill="#e0e0e0"/>
      <!-- Chart/Graph Icon -->
      <g fill="#111">
        <!-- Y-axis -->
        <rect x="8" y="4" width="2" height="23" fill="#111"/>
        <!-- X-axis -->
        <rect x="8" y="25" width="72" height="2" fill="#111"/>
        <!-- Bar 1 -->
        <rect x="14" y="15" width="8" height="10" fill="#78beba"/>
        <!-- Bar 2 -->
        <rect x="26" y="10" width="8" height="15" fill="#2069af"/>
        <!-- Bar 3 -->
        <rect x="38" y="6" width="8" height="19" fill="#d35233"/>
        <!-- Bar 4 -->
        <rect x="50" y="12" width="8" height="13" fill="#e7b225"/>
        <!-- Bar 5 -->
        <rect x="62" y="8" width="8" height="17" fill="#111"/>
        <!-- Bar 6 -->
        <rect x="74" y="14" width="6" height="11" fill="#78beba"/>
      </g>
    </svg>
  </a>
</body>
</html>
